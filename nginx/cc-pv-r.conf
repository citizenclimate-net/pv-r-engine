# nginx vhost for the PV Nature R engine — same DuckDNS + Let's Encrypt pattern
# as the BirdNET endpoint. Reverse-proxies to the plumber service on :8001.
server {
    listen 80;
    server_name citizenclimate-pv-r.duckdns.org;

    # Pillar runs can take a while (iNEXT bootstrap, Sentinel-2 fetch).
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }
}
# After `certbot --nginx -d citizenclimate-pv-r.duckdns.org`, certbot rewrites
# this block to listen on 443 with the managed certificate and redirects 80→443.
